 mapmode_zmc_local_production_efficiency_name: "ZMC | Local Production Efficiency"
 MAPMODE_ZMC_LOCAL_PRODUCTION_EFFICIENCY: "#T $mapmode_zmc_local_production_efficiency_name$#!\nThis colors [locations|e] by local [production_efficiency|e].\n\n@adm! #color_yellow Strategy#! @adm!\nBuild [buildings|e] in locations with high [production_efficiency|e] to increase their output and profit.\n\nOccupation in war creates negative [prosperity|e] which can heavily reduce [production_efficiency|e].\n\nKeep in mind that this mapmode only shows the flat local [production_efficiency|e] for all buildings, and multiple different extra bonuses should usually apply based on the specific building, like from local [rgo|e]"
 MAPMODE_ZMC_LOCAL_PRODUCTION_EFFICIENCY_TT_LAND: "[ROOT.GetLocation.GetName] has a local [production_efficiency|e] of [ROOT.GetLocation.MakeScope.ScriptValue('zmc_local_production_efficiency')|Y+]%."
 MAPMODE_ZMC_LOCAL_PRODUCTION_EFFICIENCY_TT_WATER: "[ROOT.GetLocation.GetName] is not land so it does not have a local [production_efficiency|e]."
