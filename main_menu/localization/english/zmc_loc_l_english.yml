l_english:
 #zmc

 #\n\n@warning_icon! #color_red This mapmode is laggy to click on#! @warning_icon!
 #\n\n@adm! #color_yellow Strategy#! @adm!\n

 #urbanisation suitability mapmode/urbanisation mapmode

 mapmode_zmc_urbanisation_suitability_name: "ZMC | Urbanisation Suitability"
 MAPMODE_ZMC_URBANISATION_SUITABILITY: "#T $mapmode_zmc_urbanisation_suitability_name$#!\n#color_yellow Note that this is from 1.1 and still treats all rivers as equal.#!\nThis colors [locations|e] by the [zmc_urbanisation_suitability|e] in the [location|e].\n\n@adm! #color_yellow Strategy#! @adm!\nBuild at least one [town_and_city|e] in every [province|e] to make use of all your possible [rgo|e] production bonuses and to increase province wide pop growth with [ShowBuildingTypeName('granary')] buildings.\n\nDo this in the [locations|e] with the highest [zmc_urbanisation_suitability|e] to maximise [population_capacity|e] and minimise building cost."
 MAPMODE_ZMC_URBANISATION_SUITABILITY_TT_LAND: "[ROOT.GetLocation.GetName] has an [zmc_urbanisation_suitability|e] of [ROOT.GetLocation.MakeScope.Var('zmc_local_urbanisation_suitability').GetValue|Y]."
 MAPMODE_ZMC_URBANISATION_SUITABILITY_TT_WATER: "[ROOT.GetLocation.GetName] is not land so it does not have an [zmc_urbanisation_suitability|e]."

 game_concept_zmc_urbanisation_suitability: "Urbanisation Suitability"
 game_concept_zmc_urbanisation_suitability_desc: "[zmc_urbanisation_suitability|e] is a measure of how suitable a [location|e] is for creating an [town_and_city|e] based on [geography|e]. \n\nIt is takes into account [topography|e], [vegetation|e], [climate|e], [natural_harbor_suitability|e], and if it has a [river|e] or is adjacent to a [lake|e].\n\nIt is however important to keep in mind factors other than geography, like the local [rgo|e] and [proximity|e].\n\nThe colors are only a representation of how relatively good a [location|e] is for [town_and_city|e] placement, so orange [locations|e] in a [province|e] otherwise full of red would still be a good place for an [town_and_city|e], to have at least 1 in every [province|e]."

 zmc_urbanisation_suitability_green_legend_key: "High suitability"
 zmc_urbanisation_suitability_yellow_legend_key: "Medium suitability"
 zmc_urbanisation_suitability_red_legend_key: "Low suitability"



 #building cap mapmode

 mapmode_zmc_building_cap_percentage_name: "ZMC | Used Building Slots"
 MAPMODE_ZMC_BUILDING_CAP_PERCENTAGE: "#T $mapmode_zmc_building_cap_percentage_name$#!\nThis colors [locations|e] by how many [supported_building_levels|e] are used up.\n\nKeep in mind that closed buildings or buildings with no employees do not count towards the used cap, which is not taken into consideration on the mapmode.\n\n@adm! #color_yellow Strategy#! @adm!\nBuilding over the cap massively increases the cost, so it would be wise to build more in locations with plenty of free building slots, and to not build as much in ones with most of their slots used up.\n\nYou should also keep some slots free for more expensive buildings you unlock later on, like the [ShowBuildingTypeName('university')] or [ShowBuildingTypeName('counting_house')]"
 MAPMODE_ZMC_BUILDING_CAP_PERCENTAGE_TT_LAND: "[ROOT.GetLocation.GetName] has [ROOT.GetLocation.MakeScope.ScriptValue('zmc_free_building_slots')|Y] [supported_building_levels|e] left, meaning [ROOT.GetLocation.MakeScope.ScriptValue('zmc_total_building_levels')|Y] are used up out of the cap of [ROOT.GetLocation.GetModifierValue('free_building_levels')|Y].\n\nLocation uses [ROOT.GetLocation.MakeScope.ScriptValue('zmc_used_building_slots_percentage')|Y%] of its supported building levels.\n\nKeep in mind that closed buildings or buildings with no employees do not count towards the used cap, which is not taken into consideration on the mapmode."
 MAPMODE_ZMC_BUILDING_CAP_PERCENTAGE_TT_WATER: "[ROOT.GetLocation.GetName] is not land so it does not have [supported_building_levels|e]."

 zmc_building_cap_percentage_black_legend_key: "Over 500% above cap"
 zmc_building_cap_percentage_purple_legend_key: "100% of cap used and over"
 zmc_building_cap_percentage_red_legend_key: "99% of cap used"
 zmc_building_cap_percentage_yellow_legend_key: "50% of cap used"
 zmc_building_cap_percentage_green_legend_key: "0% of cap used"



 #development growth mapmode

 mapmode_zmc_local_monthly_development_name: "ZMC | Development Growth"
 MAPMODE_ZMC_LOCAL_MONTHLY_DEVELOPMENT: "#T $mapmode_zmc_local_monthly_development_name$#!\nThis colors [locations|e] by the local monthly [development|e] growth.\n\n@adm! #color_yellow Strategy#! @adm!\nCountries with higher [development|e] growth are more likely to outpace you in the future."
 MAPMODE_ZMC_LOCAL_MONTHLY_DEVELOPMENT_TT_LAND: "[ROOT.GetLocation.GetName] has a local monthly [development|e] growth of [ROOT.GetLocation.GetModifierValueAndPercentWithCountry('local_monthly_development','local_monthly_development_modifier','global_monthly_development')]."
 MAPMODE_ZMC_LOCAL_MONTHLY_DEVELOPMENT_TT_WATER: "[ROOT.GetLocation.GetName] is not land so it does not have monthly [development|e] growth."
 MAPMODE_ZMC_LOCAL_MONTHLY_DEVELOPMENT_TT_UNCOLONISED: "[ROOT.GetLocation.GetName] is uncolonised so it does not have monthly [development|e] growth."

 #[ROOT.GetLocation.MakeScope.ScriptValue('zmc_local_monthly_development')|Y]

 zmc_local_monthly_development_purple_legend_key: "+0.05 growth"
 zmc_local_monthly_development_dark_blue_legend_key: "+0.03 growth"
 zmc_local_monthly_development_light_blue_legend_key: "+0.02 growth"
 zmc_local_monthly_development_green_legend_key: "+0.01 growth"
 zmc_local_monthly_development_yellow_legend_key: "+0.005 growth"
 zmc_local_monthly_development_red_legend_key: "+0.000 growth"
 zmc_local_monthly_development_dark_red_legend_key: "Below 0 growth"
 zmc_local_monthly_development_black_legend_key: "Below -0.03 growth"
 zmc_local_monthly_development_gray_legend_key: "Uncolonised"



 #time until 100 development mapmode

 mapmode_zmc_time_until_100_development_name: "ZMC | Years to 100 Development"
 MAPMODE_ZMC_TIME_UNTIL_100_DEVELOPMENT: "#T $mapmode_zmc_time_until_100_development_name$#!\nThis colors [locations|e] by how long it takes them to reach #color_white 100#! [development|e] at current growth.\n\n@adm! #color_yellow Strategy#! @adm!\nMost [locations|e] wont reach #color_white 100#! [development|e] within the 500 year timespan of the game, however more dev growth and thus dev is still always better."
 MAPMODE_ZMC_TIME_UNTIL_100_DEVELOPMENT_TT_LAND: "[ROOT.GetLocation.GetName] will reach 100 [development|e] in [ROOT.GetLocation.MakeScope.ScriptValue('zmc_time_until_100_development')|Y] years."
 MAPMODE_ZMC_TIME_UNTIL_100_DEVELOPMENT_TT_LAND_TIME_INFINITY: "[ROOT.GetLocation.GetName] has #color_white 0#! growth and will #color_red never#! reach #color_white 100#! [development|e]."
 MAPMODE_ZMC_TIME_UNTIL_100_DEVELOPMENT_TT_LAND_100_DEV: "[ROOT.GetLocation.GetName] has reached #color_green 100#! [development|e]."
 MAPMODE_ZMC_TIME_UNTIL_100_DEVELOPMENT_TT_WATER: "[ROOT.GetLocation.GetName] is not land so it does not have [development|e]."
 MAPMODE_ZMC_TIME_UNTIL_100_DEVELOPMENT_TT_UNCOLONISED: "[ROOT.GetLocation.GetName] is uncolonised so it does not have [development|e] growth."

 zmc_time_until_100_development_pink_legend_key: "0 years"
 zmc_time_until_100_development_dark_blue_legend_key: "50 years"
 zmc_time_until_100_development_light_blue_legend_key: "100 years"
 zmc_time_until_100_development_green_legend_key: "200 years"
 zmc_time_until_100_development_yellow_legend_key: "500 years"
 zmc_time_until_100_development_orange_legend_key: "1000 years"
 zmc_time_until_100_development_red_legend_key: "2000 years"
 zmc_time_until_100_development_dark_red_legend_key: "5000 years"
 zmc_time_until_100_development_black_legend_key: "10000+ years"
 zmc_time_until_100_development_gray_legend_key: "Uncolonised"



 #pop growth mapmode

 mapmode_zmc_pop_growth_percentage_name: "ZMC | Population Growth"
 MAPMODE_ZMC_POP_GROWTH_PERCENTAGE: "#T $mapmode_zmc_pop_growth_percentage_name$#!\nThis colors [locations|e] by the local [population_growth|e].\n\n@adm! #color_yellow Strategy#! @adm!\n[locations|e] with lower [population_growth|e] are likely near their [population_capacity|e], so consider upgrading their [location_rank|e].\n\n[towns_and_cities|e] have higher [population_capacity|e] and thus also higher [population_growth|e], but only as long as their increased capacity can overcome the lost #color_white +0.1%#! [population_growth|e] they lose compared to [rural_locations|e]."
 MAPMODE_ZMC_POP_GROWTH_PERCENTAGE_TT_LAND: "[ROOT.GetLocation.GetName] has a [population_growth|e] of [ROOT.GetLocation.GetModifierValueFixed('local_population_growth')|+%]."
 MAPMODE_ZMC_POP_GROWTH_PERCENTAGE_TT_WATER: "[ROOT.GetLocation.GetName] is not land so it does not have [population_growth|e]."
 MAPMODE_ZMC_POP_GROWTH_PERCENTAGE_TT_UNCOLONISED: "[ROOT.GetLocation.GetName] is uncolonised and therefore has a [population_growth|e] of 0%."

 zmc_pop_growth_percentage_purple_legend_key: "5% growth"
 zmc_pop_growth_percentage_dark_blue_legend_key: "3% growth"
 zmc_pop_growth_percentage_light_blue_legend_key: "2% growth"
 zmc_pop_growth_percentage_green_legend_key: "1% growth"
 zmc_pop_growth_percentage_yellow_legend_key: "0.5% growth"
 zmc_pop_growth_percentage_red_legend_key: "0% growth"
 zmc_pop_growth_percentage_dark_red_legend_key: "Below 0% growth"
 zmc_pop_growth_percentage_black_legend_key: "Below -3% growth"
 zmc_pop_growth_percentage_gray_legend_key: "Uncolonised"



 #pop cap mapmode

 mapmode_zmc_pop_cap_name: "ZMC | Population Capacity"
 MAPMODE_ZMC_POP_CAP: "#T $mapmode_zmc_pop_cap_name$#!\nThis colors [locations|e] by their local [population_capacity|e].\n\n[population_capacity|e] is mostly based on [location_rank|e], [climate|e], [topography|e], [vegetation|e], and if the [location|e] has a [river|e] or is coastal.\n\n@adm! #color_yellow Strategy#! @adm!\nIt would be wise to create [towns_and_cities|e] in places with higher [population_capacity|e] to maximise [population_growth|e]."
 MAPMODE_ZMC_POP_CAP_TT_LAND: "[ROOT.GetLocation.GetName] has a [population_capacity|e] of [ROOT.GetLocation.MakeScope.ScriptValue('zmc_pop_cap')|Y]."
 MAPMODE_ZMC_POP_CAP_TT_WATER: "[ROOT.GetLocation.GetName] is not land so it does not have a [population_capacity|e]."

 zmc_pop_cap_pink_legend_key: "2M pop cap"
 zmc_pop_cap_dark_blue_legend_key: "1M pop cap"
 zmc_pop_cap_light_blue_legend_key: "500K pop cap"
 zmc_pop_cap_green_legend_key: "250K pop cap"
 zmc_pop_cap_yellow_legend_key: "100K pop cap"
 zmc_pop_cap_red_legend_key: "50K pop cap"
 zmc_pop_cap_black_legend_key: "0 pop cap"



 #pop cap percentage mapmode

 mapmode_zmc_pop_cap_percentage_name: "ZMC | Population Capacity %"
 MAPMODE_ZMC_POP_CAP_PERCENTAGE: "#T $mapmode_zmc_pop_cap_percentage_name$#!\nThis colors [locations|e] by how much of their [population_capacity|e] is used up.\n\n@adm! #color_yellow Strategy#! @adm!\n#color_red Strongly#! consider upgrading locations #zmc_color_orange close#! #zmc_color_orange_red_1 to#! #zmc_color_orange_red_2 the#! #zmc_color_dark_red cap#! so they can have more [population_growth|e]. Even if they have a valuable [rgo|e] the extra [population|e] should more than make up for it in the long run."
 MAPMODE_ZMC_POP_CAP_PERCENTAGE_TT_LAND: "[ROOT.GetLocation.GetName] is using [ROOT.GetLocation.MakeScope.ScriptValue('zmc_pop_cap_percentage')|Y%] of its [population_capacity|e].\n\n[population|e]: [ROOT.GetLocation.MakeScope.ScriptValue('zmc_population')|Y]\n[population_capacity|e]: [ROOT.GetLocation.MakeScope.ScriptValue('zmc_pop_cap')|Y]"
 MAPMODE_ZMC_POP_CAP_PERCENTAGE_TT_WATER: "[ROOT.GetLocation.GetName] is not land so it does not have a [population|e]."

 zmc_pop_cap_percentage_black_legend_key: "200% of cap"
 zmc_pop_cap_percentage_red_legend_key: "100% of cap"
 zmc_pop_cap_percentage_yellow_legend_key: "50% of cap"
 zmc_pop_cap_percentage_green_legend_key: "0% of cap"



 #control times market access mapmode

 mapmode_zmc_control_times_market_access_name: "ZMC | Control x Market Access"
 MAPMODE_ZMC_CONTROL_TIMES_MARKET_ACCESS: "#T $mapmode_zmc_control_times_market_access_name$#!\nThis colors [locations|e] by local [control|e] multiplied by [market_access|e].\n\n@adm! #color_yellow Strategy#! @adm!\nA [buildings|e] profit depends on both [control|e] and [market_access|e], so it would be wise to build them in places with higher values on this mapmode.\n\nThis mapmode can also inform you about where the heartland of your enemy is, as usually their wealth should come from the locations with the highest [control|e] and [market_access|e].\n\nBeware that the same applies to you, so it would be wise to protect your own high value locations and not give them away in a peace deal."
 MAPMODE_ZMC_CONTROL_TIMES_MARKET_ACCESS_TT_LAND: "[ROOT.GetLocation.GetName] has [control|e] times [market_access|e] = [ROOT.GetLocation.MakeScope.ScriptValue('zmc_control_times_market_access')|Y]."
 MAPMODE_ZMC_CONTROL_TIMES_MARKET_ACCESS_TT_UNCOLONISED: "[ROOT.GetLocation.GetName] is uncolonised so it does not have [control|e] or [market_access|e]."
 MAPMODE_ZMC_CONTROL_TIMES_MARKET_ACCESS_TT_WATER: "[ROOT.GetLocation.GetName] is not land so it does not have [control|e] or [market_access|e]."

 zmc_control_times_market_access_light_blue_legend_key: "1"
 zmc_control_times_market_access_green_legend_key: "below 1"
 zmc_control_times_market_access_yellow_legend_key: "0.5"
 zmc_control_times_market_access_red_legend_key: "0"
 zmc_control_times_market_access_gray_legend_key: "Uncolonised"



 #wealth per population mapmode

 mapmode_zmc_tax_base_per_population_name: "ZMC | Tax Base per Capita"
 MAPMODE_ZMC_TAX_BASE_PER_POPULATION: "#T $mapmode_zmc_tax_base_per_population_name$#!\nThis colors [locations|e] by local [tax_base|e] per [population|e].\n\nThis means [wealth|e] is multiplied by [control|e] and divided by [population|e], effectively providing the [zmc_gdp_per_capita|e] of the [location|e].\n\n@adm! #color_yellow Strategy#! @adm!\nOccupy high valued locations from your enemy or take them in a peace deal, to inflict maximum economic damage.\n\nBeware that the same applies to you, so it would be wise to protect your own high value locations and not give them away in a peace deal."
 MAPMODE_ZMC_TAX_BASE_PER_POPULATION_TT_LAND: "[ROOT.GetLocation.GetName] has a [tax_base|e] per [population|e] of [ROOT.GetLocation.MakeScope.ScriptValue('zmc_tax_base_per_population')|Y]."
 MAPMODE_ZMC_TAX_BASE_PER_POPULATION_TT_WATER: "[ROOT.GetLocation.GetName] is not land so it does not have a [tax_base|e] or [population|e]."
 MAPMODE_ZMC_TAX_BASE_PER_POPULATION_TT_UNCOLONISED: "[ROOT.GetLocation.GetName] is uncolonised so it does not have a [tax_base|e]."

 zmc_tax_base_per_population_pink_legend_key: "50"
 zmc_tax_base_per_population_dark_blue_legend_key: "20"
 zmc_tax_base_per_population_light_blue_legend_key: "5"
