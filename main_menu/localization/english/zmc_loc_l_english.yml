 zmc_tax_base_per_population_black_legend_key: "0"
 zmc_tax_base_per_population_gray_legend_key: "Uncolonised"

 game_concept_zmc_gdp: "GDP"
 game_concept_zmc_gdp_desc: "[zmc_gdp|e] in modern economics is the total monetary value of all final goods and services produced within a place or a countries borders during a specific period, usually a quarter or a year.\n\nIn the game this could simply be understood as the [wealth|e] of a [location|e], representing the [zmc_gdp|e] per month."

 game_concept_zmc_per_capita: "Per Capita"
 game_concept_zmc_per_capita_desc: "[zmc_per_capita|e] means per person."

 game_concept_zmc_gdp_per_capita: "GDP Per Capita"
 game_concept_zmc_gdp_per_capita_desc: "[zmc_gdp|e] [zmc_per_capita|e] is calculated by dividing [zmc_gdp|e] by the population of a place or country, referred to as [zmc_per_capita|e].\n\nThis does not mean the average person is that wealthy, it just shows the average economic output per person."



 #province tax base mapmode

 mapmode_zmc_province_tax_base_name: "ZMC | Province Tax Base"
 MAPMODE_ZMC_PROVINCE_TAX_BASE: "#T $mapmode_zmc_province_tax_base_name$#!\nThis colors [locations|e] by the [tax_base|e] of their entire [province|e] added together.\n\nKeep in mind that if multiple different countries own part of the same [province|e], [locations|e] in their respective parts will have a different [province|e] [tax_base|e] compared to [locations|e] in the other country's parts."
 MAPMODE_ZMC_PROVINCE_TAX_BASE_TT_LAND: "[ROOT.GetLocation.GetName] has a [province|e] [tax_base|e] of [ROOT.GetLocation.MakeScope.ScriptValue('zmc_province_tax_base')|Y]."
 MAPMODE_ZMC_PROVINCE_TAX_BASE_TT_WATER: "[ROOT.GetLocation.GetName] is not land so it does not have a [tax_base|e]."
 MAPMODE_ZMC_PROVINCE_TAX_BASE_TT_UNCOLONISED: "[ROOT.GetLocation.GetName] is uncolonised so it does not have a [tax_base|e]."

