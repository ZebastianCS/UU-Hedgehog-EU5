 #control difference mapmode

 mapmode_zmc_control_difference_name: "ZMC | Control Difference"
 MAPMODE_ZMC_CONTROL_DIFFERENCE: "#T $mapmode_zmc_control_difference_name$#!\nThis colors [locations|e] by their difference in [control|e] to the [max_control|e].\n\nPositive values represent a [locations|e] having more [control|e] than its [max_control|e], meaning it will tick down over time, while negative values represent a [locations|e] having less [control|e] than its [max_control|e], meaning it will tick up over time.\n\n@adm! #color_yellow Strategy#! @adm!\nNewly conquered territories will often have a different [max_control|e] after they are taken, usually going down."
 MAPMODE_ZMC_CONTROL_DIFFERENCE_TT_LAND_ABOVE: "[ROOT.GetLocation.GetName] is [ROOT.GetLocation.MakeScope.ScriptValue('zmc_control_difference')|Y] [control|e] above the [max_control|e] and will tick down over time."
 MAPMODE_ZMC_CONTROL_DIFFERENCE_TT_LAND_MIDDLE: "[ROOT.GetLocation.GetName] is already within 1% of its [max_control|e]."
 MAPMODE_ZMC_CONTROL_DIFFERENCE_TT_LAND_BELOW: "[ROOT.GetLocation.GetName] is [ROOT.GetLocation.MakeScope.ScriptValue('zmc_control_difference')|Y] [control|e] below the [max_control|e] and will tick up over time."
 MAPMODE_ZMC_CONTROL_DIFFERENCE_TT_WATER: "[ROOT.GetLocation.GetName] is not land so it does not have [control|e]."
 MAPMODE_ZMC_CONTROL_DIFFERENCE_TT_UNCOLONISED: "[ROOT.GetLocation.GetName] is uncolonised so it does not have [control|e]."

